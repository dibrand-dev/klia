name: Actualizar CLAUDE.md

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar commits del dia
        id: commits
        run: |
          COMMITS=$(git log --since="24 hours ago" --oneline --no-merges)
          if [ -z "$COMMITS" ]; then
            echo "sin_cambios=true" >> "$GITHUB_OUTPUT"
          else
            echo "sin_cambios=false" >> "$GITHUB_OUTPUT"
            echo "lista<<LISTA_EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMITS" >> "$GITHUB_OUTPUT"
            echo "LISTA_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Actualizar seccion Ultimos cambios en CLAUDE.md
        if: steps.commits.outputs.sin_cambios == 'false'
        env:
          COMMITS_LISTA: ${{ steps.commits.outputs.lista }}
        run: |
          FECHA=$(TZ="America/Argentina/Buenos_Aires" date +"%Y-%m-%d")
          python3 -c "import re, os; c = open('CLAUDE.md').read(); c = re.sub('\n## Ultimos cambios\n.*', '', c, flags=re.DOTALL); open('CLAUDE.md', 'w').write(c)"
          printf '\n## Ultimos cambios\n_Actualizado el %s_\n\n```\n%s\n```\n' "$FECHA" "$COMMITS_LISTA" >> CLAUDE.md

      - name: Commit y push
        if: steps.commits.outputs.sin_cambios == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git diff --cached --quiet || git commit -m "docs: CLAUDE.md - commits del dia $(TZ='America/Argentina/Buenos_Aires' date +'%Y-%m-%d')"
          git push
